name: Build APK

on:
  workflow_dispatch: {}
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: "28.0.13004108"
      GO_VERSION: "1.25.10"
      SINGBOX_REF: "v1.14.0-alpha.29" # ядро sing-box, точно совпадает с версией SFA
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager --install "ndk;${NDK_VERSION}"

      - name: Build libbox.aar (sing-box core via gomobile)
        run: |
          set -eux
          git clone --depth 1 --branch "${SINGBOX_REF}" https://github.com/SagerNet/sing-box.git /tmp/sing-box
          cd /tmp/sing-box
          make lib_install
          export PATH="$PATH:$(go env GOPATH)/bin"
          export ANDROID_HOME="$ANDROID_SDK_ROOT"
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${NDK_VERSION}"
          make lib_android
          mkdir -p "$GITHUB_WORKSPACE/app/libs"
          AAR="$(find /tmp/sing-box -name 'libbox*.aar' | head -1)"
          echo "found libbox at: $AAR"
          cp "$AAR" "$GITHUB_WORKSPACE/app/libs/libbox.aar"

      - name: Build APK (other/debug)
        run: |
          chmod +x ./gradlew
          ./gradlew :app:assembleOtherDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: cottonvpn-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
